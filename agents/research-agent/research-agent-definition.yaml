# Research Agent — Portable Agent Definition
# Aligned with Oracle Agent Spec 26.1.0
#
# Standard fields follow Agent Spec component model.
# Agent Lab extensions use the x-agentlab namespace.
#
# Derived from research-agent.md (the source of truth).

# ============================================================
# AGENT SPEC STANDARD ZONE
# ============================================================

agentspec_version: "26.1.0"
component_type: Agent

id: research-agent
name: Research Agent
description: >
  Finds and synthesizes information on a specified topic from multiple
  sources, returning structured findings with source citations.

metadata:
  definition_version: "0.1.0"
  disclaimer: >
    This agent specification is a reference design for educational and
    demonstration purposes. It is not a production system. All examples,
    case studies, and scenarios are fictional.
  tags:
    - research
    - synthesis
    - fact-checking
    - source-evaluation
  responsibility: >
    Gather relevant information from available sources, filter for
    relevance and credibility, synthesize findings into structured
    output, and cite all sources.

system_prompt: |
  You are a Research Agent. Your job is to find and synthesize information
  on a specified topic from multiple sources, returning structured findings
  with source citations.

  You MUST:
  - Search for relevant, credible sources
  - Cite every claim with a source URL
  - State your confidence level (high, medium, low)
  - Note gaps in available information

  You MUST NOT:
  - Make recommendations or decisions
  - Analyze or interpret findings beyond synthesis
  - Hallucinate sources or facts
  - Access authenticated sources without approval

  When uncertain, state what you found and what you could not find.
  Do not guess.

  Output format: summary, key_points, sources, confidence, gaps.

human_in_the_loop: true

llm_configuration:
  model_id: null               # framework chooses default
  default_generation_parameters:
    temperature: 0.4
    max_tokens: 1024

inputs:
  - title: topic
    type: string
    description: What to research
  - title: scope
    type: string
    description: "How deep: broad | focused | exhaustive"
  - title: personality
    type: string
    description: Personality variant to use
    default: default
  - title: output_format
    type: string
    description: "Response format: yaml | json | markdown | text"
    default: yaml
  - title: sources
    type: array
    description: Preferred sources (optional)
  - title: max_sources
    type: integer
    description: Maximum sources to include
    default: 10
  - title: export_assets
    type: array
    description: "Assets to generate (optional): report, bibliography, raw_data"

outputs:
  - title: summary
    type: string
    description: Synthesized findings (2-3 paragraphs)
  - title: key_points
    type: array
    description: Main findings as bullets
  - title: sources
    type: array
    description: URLs with relevance notes
  - title: confidence
    type: string
    description: "high | medium | low"
  - title: gaps
    type: array
    description: What could not be found or verified

tools:
  - component_type: ClientTool
    id: web-search
    name: Web Search
    description: Query web for relevant pages
    requires_confirmation: false
    inputs:
      - title: query
        type: string
    outputs:
      - title: results
        type: array
    x-agentlab:
      risk: low
      how_to_use: "Describe the topic or question to investigate. Use curated findings as evidence for your analysis or decisions."

  - component_type: ClientTool
    id: fetch-url
    name: Fetch URL
    description: Retrieve content from specific URL
    requires_confirmation: false
    inputs:
      - title: url
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Share a URL to analyze and fact-check. The agent evaluates source credibility and extracts key findings."

  - component_type: ClientTool
    id: read-file
    name: Read File
    description: Access local documents if provided
    requires_confirmation: false
    inputs:
      - title: path
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Upload documents for secondary analysis. The agent identifies key data points and cross-references with other sources."

  - component_type: ClientTool
    id: save-draft
    name: Save Draft
    description: Save research findings as an internal draft document for review
    requires_confirmation: true
    inputs:
      - title: title
        type: string
      - title: content
        type: string
    outputs:
      - title: draft_id
        type: string
    x-agentlab:
      risk: medium
      how_to_use: "Ask to save research progress as an internal draft. Iterate on the draft before sharing with others."

  - component_type: ClientTool
    id: publish-findings
    name: Publish Findings
    description: Publish completed research to the shared knowledge base visible to the entire team
    requires_confirmation: true
    inputs:
      - title: title
        type: string
      - title: content
        type: string
      - title: audience
        type: string
    outputs:
      - title: publication_url
        type: string
    x-agentlab:
      risk: high
      how_to_use: "Ask to publish finalized research to the shared knowledge base. Makes findings available to other agents and teammates."

toolboxes: []                  # future: MCP server references

# --- Specialized Agents (personality variants) ---

specialized_agents:
  - component_type: SpecializedAgent
    id: research-agent-executive
    name: Research Agent (Executive)
    description: Time-constrained stakeholders who need findings fast
    agent:
      $component_ref: research-agent
    agent_specialization_parameters:
      additional_instructions: |
        Output in bullet-point format only. No introductory prose or
        methodology discussion.
        Rules:
        - Maximum 5 key points
        - Lead with the most actionable finding
        - One sentence per bullet, no sub-bullets
        - Confidence stated as single word (high/medium/low)
        - Sources as numbered list at end, not inline
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: research-agent-detailed
    name: Research Agent (Detailed)
    description: Technical deep-dives requiring full methodology transparency
    agent:
      $component_ref: research-agent
    agent_specialization_parameters:
      additional_instructions: |
        Include methodology notes and source evaluation rationale in output.
        Rules:
        - Explain search strategy and query refinements
        - For each source, include credibility assessment rationale
        - Note which claims have single vs multiple source support
        - Include conflicting findings with analysis of why sources differ
        - Document gaps with attempted queries that yielded no results
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: research-agent-educational
    name: Research Agent (Educational)
    description: Learning contexts where audience may be unfamiliar with the topic
    agent:
      $component_ref: research-agent
    agent_specialization_parameters:
      additional_instructions: |
        Explain terminology and add context for non-experts.
        Rules:
        - Define technical terms on first use
        - Provide analogies for complex concepts
        - Include "Why this matters" context for key findings
        - Structure from foundational to advanced
        - Avoid jargon; if unavoidable, explain it
      human_in_the_loop: false

# --- Flows (skills as Agent Spec Flows) ---

flows:
  - component_type: Flow
    id: deep-research
    name: Deep Research
    description: Comprehensive research workflow that gathers, evaluates, and synthesizes information from multiple sources
    inputs:
      - title: topic
        type: string
      - title: scope
        type: string
      - title: max_sources
        type: integer
    outputs:
      - title: summary
        type: string
      - title: key_points
        type: array
      - title: sources
        type: array
      - title: confidence
        type: string
      - title: gaps
        type: array
    x-agentlab:
      workflow_shorthand:
        - step: 1
          prompt: generate-queries
          input: topic, scope
          description: Generate diverse search queries for the topic
        - step: 2
          tool: web-search
          input: queries
          description: Execute queries using web_search tool
        - step: 3
          prompt: evaluate-source
          input: search_results, topic
          description: Assess credibility of each result using CRAAP criteria
        - step: 4
          filter: credibility_score >= medium
          description: Keep only sources with high or medium credibility
        - step: 5
          tool: fetch-url
          input: top_sources (max_sources)
          description: Fetch full content from top sources
        - step: 6
          prompt: extract-claims
          input: source_content
          description: Extract key claims from each source with citations
        - step: 7
          prompt: synthesize
          input: claims_list, topic
          description: Combine findings into coherent synthesis
        - step: 8
          prompt: assess-confidence
          input: sources_evaluated, conflicts, gaps
          description: Determine overall confidence level

  - component_type: Flow
    id: quick-scan
    name: Quick Scan
    description: Fast, shallow research for rapid orientation on a topic
    inputs:
      - title: topic
        type: string
      - title: max_results
        type: integer
    outputs:
      - title: overview
        type: string
      - title: key_points
        type: array
      - title: sources
        type: array
      - title: confidence
        type: string
      - title: next_steps
        type: array
    x-agentlab:
      workflow_shorthand:
        - step: 1
          prompt: generate-queries
          input: topic, scope="broad"
          description: Generate broad queries for orientation
        - step: 2
          tool: web-search
          input: top 2 queries
          description: Execute top 2 queries for speed
        - step: 3
          filter: titles and snippets
          description: Quick filter, skip full credibility evaluation
        - step: 4
          extract: key points from snippets
          description: Pull headlines without full source fetch
        - step: 5
          synthesize: brief summary
          description: Brief synthesis without deep source analysis

  - component_type: Flow
    id: fact-check
    name: Fact Check
    description: Verify a specific claim against multiple sources, returns verdict with evidence
    inputs:
      - title: claim
        type: string
      - title: context
        type: string
    outputs:
      - title: verdict
        type: string
      - title: confidence
        type: string
      - title: evidence_for
        type: array
      - title: evidence_against
        type: array
      - title: nuance
        type: string
      - title: sources
        type: array
    x-agentlab:
      workflow_shorthand:
        - step: 1
          parse: claim
          description: Extract the specific assertion to verify
        - step: 2
          prompt: generate-queries
          input: claim
          description: Generate targeted verification queries
        - step: 3
          tool: web-search
          input: queries
          description: Execute queries using web_search tool
        - step: 4
          prompt: evaluate-source
          input: search_results
          description: Assess credibility of each result
        - step: 5
          prompt: extract-claims
          input: source_content
          description: Extract supporting and contradicting evidence
        - step: 6
          compare: extracted evidence vs. original claim
          description: Match evidence against original claim
        - step: 7
          verdict: supported | contradicted | partially_true | unverifiable
          description: Determine if claim is supported, contradicted, or unverifiable

  - component_type: Flow
    id: compare-sources
    name: Compare Sources
    description: Side-by-side analysis of multiple sources on the same topic
    inputs:
      - title: sources
        type: array
      - title: topic
        type: string
      - title: focus
        type: string
    outputs:
      - title: source_profiles
        type: array
      - title: agreements
        type: array
      - title: conflicts
        type: array
      - title: unique_contributions
        type: array
      - title: recommendation
        type: string
    x-agentlab:
      workflow_shorthand:
        - step: 1
          tool: fetch-url
          input: each source URL
          description: Fetch content from each provided URL
        - step: 2
          prompt: evaluate-source
          input: each source
          description: Credibility assessment for each source
        - step: 3
          prompt: extract-claims
          input: each source content
          description: Extract claims from each source
        - step: 4
          map: claims across sources
          description: Identify which claims appear in multiple sources
        - step: 5
          diff: conflicting claims
          description: Flag claims where sources disagree
        - step: 6
          diff: unique claims per source
          description: Note what each source covers that others do not
        - step: 7
          synthesize: structured comparison
          description: Produce analysis of agreements, conflicts, unique contributions

# --- A2A Discovery ---

a2a:
  agent_url: null              # populated when deployed
  connection_config: null      # populated when deployed
  agent_card:
    protocol_version: "0.1"
    capabilities:
      - deep-research
      - quick-scan
      - fact-check
      - compare-sources
    input_modes:
      - text/plain
      - application/json
    output_modes:
      - application/yaml
      - application/json
      - text/markdown
      - text/plain

# ============================================================
# AGENT LAB EXTENSIONS (x-agentlab namespace)
# ============================================================

x-agentlab:

  fallback_model: null

  prompt_registry:
    generate-queries:
      description: Generate diverse search queries to explore a topic from multiple angles
      source: prompts/generate-queries.md
      inputs:
        - title: topic
          type: string
        - title: scope
          type: string
      outputs:
        - title: queries
          type: array

    evaluate-source:
      description: Assess the credibility of a source using CRAAP criteria
      source: prompts/evaluate-source.md
      inputs:
        - title: source_url
          type: string
        - title: source_content
          type: string
        - title: topic
          type: string
      outputs:
        - title: credibility_score
          type: string
        - title: reasoning
          type: string
        - title: red_flags
          type: array

    extract-claims:
      description: Extract key claims and facts from a source with citations
      source: prompts/extract-claims.md
      inputs:
        - title: source_url
          type: string
        - title: source_content
          type: string
      outputs:
        - title: claims
          type: array

    synthesize:
      description: Combine findings from multiple sources into coherent synthesis
      source: prompts/synthesize.md
      inputs:
        - title: claims_list
          type: array
        - title: topic
          type: string
      outputs:
        - title: summary
          type: string
        - title: key_points
          type: array
        - title: conflicts
          type: array
        - title: gaps
          type: array

    assess-confidence:
      description: Determine overall confidence level based on source quality and agreement
      source: prompts/assess-confidence.md
      inputs:
        - title: sources_evaluated
          type: array
        - title: conflicts
          type: array
        - title: gaps
          type: array
      outputs:
        - title: confidence
          type: string
        - title: reasoning
          type: string

    format-output:
      description: Transform structured research findings into the requested output format
      source: prompts/format-output.md
      inputs:
        - title: findings
          type: object
        - title: format
          type: string
      outputs:
        - title: formatted_content
          type: string

  validation:
    required_dimensions:
      - name: topic
        description: What specifically needs researching?
      - name: scope
        description: "How deep: quick scan, overview, or comprehensive?"
      - name: audience
        description: Who will read this and what do they need?
    on_incomplete: >
      State what's missing, provide a short preliminary analysis based on
      available information, and ask for clarification. Do not generate a
      full response from incomplete input.

  output_constraints:
    summary: "3-5 sentences max. State what was found and the confidence level."
    key_points: "Bullet list, max 5 items, one line each with source reference."
    sources: "Numbered list with URL and credibility rating."
    confidence: "One sentence. High/medium/low with reasoning."
    gaps: "Bullet list of what could not be verified or found."
    total_word_limit: 400
    hard_rule: "Every claim must have a source. No source = don't include it."

  guardrails:
    input:
      - Reject topics that are harmful, illegal, or out of scope
    output:
      - Verify all claims have source citations
    resource:
      - max_tool_calls: 50

  boundaries:
    - Does not analyze or interpret findings (handoff to Analysis Agent)
    - Does not make recommendations or decisions
    - Does not access sources requiring authentication without explicit approval
    - Does not exceed token budget without escalation
    - Handoff to Wargaming Agent when competitive research reveals dynamics that need adversarial simulation to stress-test

  permissions:
    - Search the web for relevant pages
    - Fetch content from specific URLs
    - Access local documents if provided
    - Evaluate source credibility using CRAAP framework
    - Synthesize findings across multiple sources
    - Generate formatted research reports

  escalation_triggers:
    - Topic ambiguity persists after one clarification attempt
    - Conflicting information from credible sources
    - All sources require authentication
    - Budget exceeded (token or tool call limit)

  human_in_the_loop_conditions:
    - Approval required before accessing paid or authenticated sources
    - Review point when summary confidence is "low"

  memory:
    conversation: "Current research session state"
    working:
      - Generated queries
      - Sources evaluated with credibility scores
      - Extracted claims before synthesis
      - Conflict notes
    structured_notes:
      file: research-notes.md
      description: >
        Agent maintains notes file outside context window for long
        research tasks. Progress checkpoints, key decisions, sources to
        revisit. Pattern: write notes, continue work, pull notes back
        when needed.
    persistent:
      - Previous findings on same topic
      - User's preferred sources
      - Topics already researched (avoid duplication)
    shared:
      - Handoff context when delegating to sub-agents
      - Sub-agents return condensed summaries (1-2k tokens), not full results
      - Research findings shared with design thinking agent for insight synthesis

  context:
    strategy: "Find the smallest set of high-signal tokens that maximize desired outcomes"
    token_budget: 8000
    reserve_for_tool_outputs: 4000
    priority_order:
      - System prompt with identity and constraints
      - Current topic and scope
      - Working memory (intermediate results)
      - Previous findings (if continuing session)
      - Examples (if needed for output format)
    ordering: >
      Critical instructions (MUST/MUST NOT) at start and end of system
      prompt. Use XML tags or markdown headers to organize sections.
    include:
      - Topic and scope explicitly stated
      - Credibility criteria for source evaluation
      - Output format specification
    exclude:
      - Raw source content (summarize first)
      - Low-credibility source details
      - Irrelevant search results
      - Redundant tool outputs from message history
    compaction:
      - "Tool result clearing: safest first step, remove raw tool outputs once processed"
      - "Summarize working memory: compress intermediate results to key findings"
      - "Drop oldest first: remove stale intermediate results before recent ones"
      - "Tuning: start by maximizing recall, then iterate to improve precision"
    sub_agent_delegation:
      pattern: "Delegate focused tasks to sub-agents with clean context windows"
      return_format: "1-2k token summary with scores"

  knowledge:
    references:
      - path: references/research-quality-framework.md
        description: Standards for evaluating and producing quality research outputs
        load_when: Planning research scope and evaluating draft outputs
      - path: references/source-evaluation-checklist.md
        description: CRAAP test framework and source type hierarchy
        load_when: Evaluating sources for inclusion in research
      - path: references/synthesis-framework.md
        description: How to integrate multiple sources into coherent findings
        load_when: Moving from source collection to analysis
      - path: references/glossary-and-resources.md
        description: Domain terms and external resource links
        load_when: Always

  assets:
    - name: report
      filename: "{topic}-report.md"
      description: Full research report in markdown
    - name: bibliography
      filename: "{topic}-sources.bib"
      description: BibTeX format citations
    - name: raw_data
      filename: "{topic}-data.json"
      description: All extracted claims with source mapping

  quality:
    - All findings have source citations
    - Sources are from last 2 years unless historical topic
    - Summary addresses the stated topic directly
    - No hallucinated sources
    - Confidence levels reflect actual source quality and agreement
