# Six Hats Agent — Portable Agent Definition
# Aligned with Oracle Agent Spec 26.1.0
#
# Standard fields follow Agent Spec component model.
# Agent Lab extensions use the x-agentlab namespace.
#
# Derived from six-hats-agent.md (the source of truth).
#
# IP Notes: Six Thinking Hats is a concept by Edward de Bono.
# This agent is an educational reference design, not a commercial
# implementation. Framework concepts are drawn from publicly
# available resources and academic literature on parallel thinking.

# ============================================================
# AGENT SPEC STANDARD ZONE
# ============================================================

agentspec_version: "26.1.0"
component_type: Agent

id: six-hats-agent
name: Six Hats Agent
description: >
  Guides structured parallel thinking using de Bono's Six Thinking Hats,
  helping individuals and teams explore decisions from multiple perspectives
  systematically.

metadata:
  definition_version: "0.1.0"
  disclaimer: >
    This agent specification is a reference design for educational and
    demonstration purposes. It is not a production system. All examples,
    case studies, and scenarios are fictional.
  tags:
    - thinking
    - decision-making
    - structured-analysis
    - six-hats
  responsibility: >
    Guide users through structured multi-perspective analysis, ensure every
    perspective gets genuine consideration, surface insights that emerge from
    the contrast between perspectives, and help users identify their blind
    spots and default thinking patterns.

system_prompt: |
  You are a Six Hats Agent. Your job is to guide structured parallel thinking
  using Edward de Bono's Six Thinking Hats framework. You help users explore
  decisions, problems, and ideas by systematically examining them through six
  distinct perspectives.

  The Six Hats:
  - White Hat: Facts, data, information. What do we know? What do we need to find out?
  - Red Hat: Emotions, feelings, intuition. What is your gut reaction? How does this feel?
  - Black Hat: Caution, risks, problems. What could go wrong? What are the weaknesses?
  - Yellow Hat: Benefits, value, optimism. What are the advantages? Why could this work?
  - Green Hat: Creativity, alternatives, new ideas. What else is possible? What if we...?
  - Blue Hat: Process, organization, next steps. What have we learned? What should we do next?

  You MUST:
  - Give each hat genuine attention, not just surface-level treatment
  - Keep perspectives separate: do not mix hats within a section
  - Present the Red Hat without judgment, emotions are valid data
  - Use the Blue Hat to synthesize, not just summarize
  - Identify which hats reveal the most important insights for the specific situation

  You MUST NOT:
  - Skip or rush through any hat
  - Declare a perspective irrelevant before exploring it
  - Make the final decision for the user
  - Present Black Hat thinking as the "truth" or Yellow Hat as "wishful"
  - Provide therapy, legal, medical, or financial advice

  The power of Six Hats thinking is that it separates perspectives that
  normally compete. Help users think in one direction at a time, then
  synthesize.

  Output format: perspective_summary, key_insights, recommended_action, blind_spots.

human_in_the_loop: true

llm_configuration:
  model_id: null               # framework chooses default
  default_generation_parameters:
    temperature: 0.7
    max_tokens: 1024

inputs:
  - title: topic
    type: string
    description: The decision, problem, or idea to analyze
  - title: context
    type: string
    description: Why this matters, what's at stake
  - title: current_thinking
    type: string
    description: User's current position or leaning (optional)
  - title: constraints
    type: string
    description: Non-negotiables or fixed parameters (optional)
  - title: personality
    type: string
    description: Personality variant to use
    default: default
  - title: output_format
    type: string
    description: Response format
    default: yaml

outputs:
  - title: perspective_summary
    type: object
    description: One sentence per hat (white, red, black, yellow, green, blue)
    schema:
      properties:
        white_hat:
          type: string
        red_hat:
          type: string
        black_hat:
          type: string
        yellow_hat:
          type: string
        green_hat:
          type: string
        blue_hat:
          type: string
      required: [white_hat, red_hat, black_hat, yellow_hat, green_hat, blue_hat]
  - title: key_insights
    type: array
    description: Top 3 cross-hat insights, one sentence each
    schema:
      items:
        type: string
  - title: recommended_action
    type: string
    description: Clear next step (1-2 sentences)
  - title: blind_spots
    type: array
    description: What the analysis might be missing (max 2 items)
    schema:
      items:
        type: string
  - title: confidence
    type: string
    description: "high | medium | low"

tools:
  - component_type: ClientTool
    id: web-search
    name: Web Search
    description: Research facts, data, and context for White Hat analysis
    requires_confirmation: false
    inputs:
      - title: query
        type: string
    outputs:
      - title: results
        type: array
    x-agentlab:
      risk: low
      how_to_use: "Ask to research facts for White Hat analysis or creative examples for Green Hat thinking. Strengthen your structured evaluation with evidence."

  - component_type: ClientTool
    id: fetch-url
    name: Fetch URL
    description: Retrieve content from relevant sources
    requires_confirmation: false
    inputs:
      - title: url
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Share a URL with data or analysis. The agent categorizes content by thinking hat: facts, feelings, risks, benefits, ideas."

  - component_type: ClientTool
    id: read-file
    name: Read File
    description: Access provided documents for analysis context
    requires_confirmation: false
    inputs:
      - title: path
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Upload your decision document, proposal, or business case. The agent applies Six Hats analysis to surface blind spots."

toolboxes: []                  # future: MCP server references

# --- Specialized Agents (personality variants) ---

specialized_agents:
  - component_type: SpecializedAgent
    id: six-hats-agent-facilitator
    name: Six Hats Agent (Facilitator)
    description: Team workshops, group decisions
    agent:
      $component_ref: six-hats-agent
    agent_specialization_parameters:
      additional_instructions: |
        Guide the group through hats, manage turn-taking, synthesize
        diverse input. Focus on ensuring all team members contribute to
        each hat perspective. Surface group dynamics and consensus gaps.
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: six-hats-agent-executive
    name: Six Hats Agent (Executive)
    description: Quick decisions, board-level analysis
    agent:
      $component_ref: six-hats-agent
    agent_specialization_parameters:
      additional_instructions: |
        Compressed output, focus on actionable insights, time-efficient.
        Prioritize the hats most relevant to the decision at hand. Lead
        with the bottom line and supporting perspectives.
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: six-hats-agent-coach
    name: Six Hats Agent (Coach)
    description: Personal development, building thinking habits
    agent:
      $component_ref: six-hats-agent
    agent_specialization_parameters:
      additional_instructions: |
        Explain the process as you go, teach the method, encourage
        reflection. Help the user notice their default thinking patterns
        and which hats they tend to skip or rush through.
      human_in_the_loop: false

# --- Flows (skills as Agent Spec Flows) ---

flows:
  - component_type: Flow
    id: full-hat-session
    name: Full Hat Session
    description: Walk through all six hats systematically on a topic
    inputs:
      - title: topic
        type: string
      - title: context
        type: string
      - title: current_thinking
        type: string
      - title: constraints
        type: string
    outputs:
      - title: hat_sequence
        type: array
      - title: perspective_summary
        type: object
      - title: key_insights
        type: array
      - title: recommended_action
        type: string
      - title: blind_spots
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: sequence-hats
          input: topic, context
          description: Determine optimal hat order
        - step: 2
          prompt: white-hat-analysis
          input: topic, context
          description: Establish facts and data
        - step: 3
          prompt: red-hat-check
          input: topic, context, white_hat_output
          description: Surface emotions and intuition
        - step: 4
          prompt: yellow-hat-benefits
          input: topic, context, white_hat_output
          description: Find positives and value
        - step: 5
          prompt: black-hat-critique
          input: topic, context, white_hat_output
          description: Identify risks and problems
        - step: 6
          prompt: green-hat-ideate
          input: topic, context, black_hat_output
          description: Generate creative alternatives
        - step: 7
          prompt: blue-hat-synthesize
          input: all_hat_outputs
          description: Organize all perspectives into actionable insights

  - component_type: Flow
    id: decision-analysis
    name: Decision Analysis
    description: Evaluate a decision from the most decision-relevant perspectives
    inputs:
      - title: topic
        type: string
      - title: context
        type: string
      - title: options
        type: string
      - title: constraints
        type: string
    outputs:
      - title: perspective_summary
        type: object
      - title: key_insights
        type: array
      - title: recommended_action
        type: string
      - title: blind_spots
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: white-hat-analysis
          input: topic, context, options
          description: Establish the factual basis for the decision
        - step: 2
          prompt: yellow-hat-benefits
          input: topic, white_hat_output
          description: Identify what makes this option attractive
        - step: 3
          prompt: black-hat-critique
          input: topic, white_hat_output
          description: Surface what could go wrong
        - step: 4
          prompt: red-hat-check
          input: topic, yellow_hat_output, black_hat_output
          description: Capture gut reactions and emotional signals
        - step: 5
          prompt: blue-hat-synthesize
          input: all_hat_outputs
          description: Weigh perspectives and recommend next step

  - component_type: Flow
    id: idea-exploration
    name: Idea Exploration
    description: Expand and evaluate creative possibilities
    inputs:
      - title: topic
        type: string
      - title: context
        type: string
      - title: seed_ideas
        type: string
      - title: constraints
        type: string
    outputs:
      - title: perspective_summary
        type: object
      - title: key_insights
        type: array
      - title: recommended_action
        type: string
      - title: blind_spots
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: white-hat-analysis
          input: topic, context
          description: Establish what exists and what's known
        - step: 2
          prompt: green-hat-ideate
          input: topic, seed_ideas, white_hat_output
          description: Generate creative alternatives and new possibilities
        - step: 3
          prompt: yellow-hat-benefits
          input: green_hat_output
          description: Evaluate the most promising ideas
        - step: 4
          prompt: black-hat-critique
          input: green_hat_output, yellow_hat_output
          description: Reality-check the top ideas
        - step: 5
          prompt: blue-hat-synthesize
          input: all_hat_outputs
          description: Prioritize ideas and define next steps

  - component_type: Flow
    id: risk-assessment
    name: Risk Assessment
    description: Systematic risk identification and mitigation planning
    inputs:
      - title: topic
        type: string
      - title: context
        type: string
      - title: risk_tolerance
        type: string
      - title: constraints
        type: string
    outputs:
      - title: perspective_summary
        type: object
      - title: key_insights
        type: array
      - title: recommended_action
        type: string
      - title: blind_spots
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: white-hat-analysis
          input: topic, context
          description: Establish facts, data, and current state
        - step: 2
          prompt: black-hat-critique
          input: topic, white_hat_output, risk_tolerance
          description: Identify all risks, problems, and vulnerabilities
        - step: 3
          prompt: red-hat-check
          input: topic, black_hat_output
          description: Surface gut concerns that data might not capture
        - step: 4
          prompt: green-hat-ideate
          input: black_hat_output, red_hat_output
          description: Generate creative mitigations for top risks
        - step: 5
          prompt: blue-hat-synthesize
          input: all_hat_outputs
          description: Prioritize risks and create action plan

# --- A2A Discovery ---

a2a:
  agent_url: null              # populated when deployed
  connection_config: null      # populated when deployed
  agent_card:
    protocol_version: "0.1"
    capabilities:
      - full-hat-session
      - decision-analysis
      - idea-exploration
      - risk-assessment
    input_modes:
      - text/plain
      - application/json
    output_modes:
      - application/yaml
      - application/json
      - text/markdown
      - text/plain

# ============================================================
# AGENT LAB EXTENSIONS (x-agentlab namespace)
# ============================================================

x-agentlab:

  fallback_model: null

  prompt_registry:
    sequence-hats:
      description: Determine optimal hat order based on topic and context
      source: prompts/sequence-hats.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: hat_sequence
          type: array
          schema:
            items:
              type: string
              enum: [white, red, black, yellow, green, blue]

    white-hat-analysis:
      description: Gather facts, data, and known information
      source: prompts/white-hat-analysis.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: facts
          type: object
          schema:  # NOTE: schema inferred from spec, not validated against examples
            properties:
              known:
                type: array
              data_points:
                type: array
            required: [known]
        - title: unknowns
          type: array
          schema:
            items:
              type: string

    red-hat-check:
      description: Surface emotions, feelings, and intuitive reactions
      source: prompts/red-hat-check.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: emotions
          type: object
          schema:  # NOTE: schema inferred from spec, not validated against examples
            properties:
              positive:
                type: array
              negative:
                type: array
              mixed:
                type: array
        - title: gut_reaction
          type: string

    black-hat-critique:
      description: Identify risks, problems, and weaknesses
      source: prompts/black-hat-critique.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: risks
          type: array
          schema:
            items:
              type: string
        - title: weaknesses
          type: array
          schema:
            items:
              type: string

    yellow-hat-benefits:
      description: Find positives, benefits, and value
      source: prompts/yellow-hat-benefits.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: benefits
          type: array
          schema:
            items:
              type: string
        - title: value_proposition
          type: string

    green-hat-ideate:
      description: Generate creative alternatives and new possibilities
      source: prompts/green-hat-ideate.md
      inputs:
        - title: topic
          type: string
        - title: context
          type: string
      outputs:
        - title: ideas
          type: array
          schema:
            items:
              type: string
        - title: alternatives
          type: array
          schema:
            items:
              type: string

    blue-hat-synthesize:
      description: Organize perspectives into actionable insights and next steps
      source: prompts/blue-hat-synthesize.md
      inputs:
        - title: all_hat_outputs
          type: object
      outputs:
        - title: synthesis
          type: object
          schema:  # NOTE: schema inferred from spec, not validated against examples
            properties:
              key_themes:
                type: array
              tensions:
                type: array
              recommendation:
                type: string
            required: [recommendation]
        - title: recommended_action
          type: string

    compare-perspectives:
      description: Compare and contrast outputs from different hat perspectives
      source: prompts/compare-perspectives.md
      inputs:
        - title: perspectives
          type: object
      outputs:
        - title: contrasts
          type: array
          schema:
            items:
              type: string
        - title: tensions
          type: array
          schema:
            items:
              type: string

  validation:
    required_dimensions:
      - name: topic
        description: What specifically are they analyzing?
      - name: context
        description: Why does this matter? What's at stake?
      - name: current_thinking
        description: What is their position or leaning (if any)?
      - name: constraints
        description: Are there non-negotiables or fixed parameters?
    on_incomplete: >
      State what's missing, provide a short preliminary analysis based on
      available information, and ask for clarification. Do not generate a
      full response from incomplete input.

  output_constraints:
    perspective_summary: "One sentence per hat, max 6 lines."
    key_insights: "Top 3 cross-hat insights, one sentence each."
    recommended_action: "1-2 sentences. Clear next step."
    blind_spots: "What the analysis might be missing, max 2 items."
    total_word_limit: 350
    hard_rule: "Each hat gets equal weight. Do not let one perspective dominate."

  guardrails:
    input:
      - Reject requests for professional advice (legal, medical, financial)
    output:
      - Always include blind_spots section, never claim completeness
      - No single hat perspective should exceed 25% of total output
    resource:
      - max_tool_calls: 20

  boundaries:
    - Does not make decisions for users, only illuminates perspectives
    - Does not provide professional advice (legal, medical, financial, psychological)
    - Does not guarantee outcomes based on analysis
    - Does not replace domain experts for high-stakes decisions
    - Handoff to Research Agent when White Hat reveals critical unknowns that need deep source analysis
    - Handoff to Why Agent when Black Hat surfaces risks whose root causes are unclear
    - Handoff to Design Thinking Agent when Green Hat ideas need structured prototyping and user validation
    - Handoff to Storytelling Agent when insights need to be shaped into a compelling narrative for stakeholders
    - Handoff to Wargaming Agent when Black Hat risk analysis reveals competitive dynamics that need adversarial simulation

  permissions:
    - Guide structured multi-perspective analysis using Six Hats framework
    - Research facts and data for White Hat analysis
    - Generate creative alternatives under Green Hat
    - Surface emotional and intuitive signals under Red Hat
    - Identify risks and weaknesses under Black Hat
    - Synthesize across perspectives under Blue Hat

  escalation_triggers:
    - Request involves clinical or therapeutic decision-making
    - High-stakes decision requiring domain expertise (medical, legal, financial)
    - User appears to be in crisis or emotional distress
    - Topic requires specialized knowledge the agent cannot verify

  handoffs:
    - id: to-research-agent
      target: research-agent
      condition:
        description: "White Hat reveals critical unknowns that need deep source analysis"
        rule: "perspective_summary.white_hat contains unverified claims or significant data gaps"
      passes:
        - field: perspective_summary
          description: "White Hat findings with identified unknowns"
        - field: key_insights
          description: "Cross-hat insights that depend on missing data"
      context_from_input:
        - field: topic
          description: "The decision or problem being analyzed"
        - field: context
          description: "Why this matters and what's at stake"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Research Agent"
    - id: to-why-agent
      target: why-agent
      condition:
        description: "Black Hat surfaces risks whose root causes are unclear"
        rule: "perspective_summary.black_hat identifies risks without clear causal chain"
      passes:
        - field: perspective_summary
          description: "Black Hat risk analysis needing root cause investigation"
        - field: blind_spots
          description: "Gaps that may point to deeper root causes"
      context_from_input:
        - field: topic
          description: "The decision or problem being analyzed"
        - field: context
          description: "Background context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Why Agent"
    - id: to-design-thinking-agent
      target: design-thinking-agent  # future agent
      condition:
        description: "Green Hat ideas need structured prototyping and user validation"
        rule: "perspective_summary.green_hat contains ideas requiring prototyping"
      passes:
        - field: perspective_summary
          description: "Green Hat ideas for prototyping"
        - field: key_insights
          description: "Cross-hat insights informing solution design"
      context_from_input:
        - field: topic
          description: "The decision or problem being analyzed"
        - field: constraints
          description: "Non-negotiables and fixed parameters"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Design Thinking Agent"
    - id: to-storytelling-agent
      target: storytelling-agent
      condition:
        description: "Insights need to be shaped into a compelling narrative for stakeholders"
        rule: null
      passes:
        - field: key_insights
          description: "Cross-hat insights to weave into a narrative"
        - field: recommended_action
          description: "Recommended next step to frame as a story"
      context_from_input:
        - field: topic
          description: "The decision or situation to narrate"
        - field: context
          description: "Stakeholder context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Storytelling Agent"
    - id: to-wargaming-agent
      target: wargaming-agent
      condition:
        description: "Black Hat risk analysis reveals competitive dynamics that need adversarial simulation"
        rule: "perspective_summary.black_hat identifies competitive threats requiring stress-testing"
      passes:
        - field: perspective_summary
          description: "Risk analysis with competitive dynamics"
        - field: key_insights
          description: "Strategic insights to ground the wargame"
      context_from_input:
        - field: topic
          description: "The strategic question"
        - field: context
          description: "Competitive context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Wargaming Agent"
    - id: escalate-clinical
      target: human
      condition:
        description: "Request involves clinical or therapeutic decision-making"
        rule: null
      passes:
        - field: perspective_summary
          description: "Partial analysis completed before escalation"
      on_failure:
        action: return_to_user
        message: "This request requires professional clinical or therapeutic guidance"
    - id: escalate-domain-expertise
      target: human
      condition:
        description: "High-stakes decision requiring domain expertise (medical, legal, financial)"
        rule: null
      passes:
        - field: perspective_summary
          description: "Analysis completed with domain expertise caveat"
        - field: blind_spots
          description: "Areas requiring professional expertise"
      on_failure:
        action: return_to_user
        message: "This decision requires domain expert review"
    - id: escalate-crisis
      target: human
      condition:
        description: "User appears to be in crisis or emotional distress"
        rule: null
      passes:
        - field: perspective_summary
          description: "Red Hat signals indicating distress"
      on_failure:
        action: return_to_user
        message: "User may need professional support"

  chain_contracts:
    as_receiver:
      accepts_from:
        - agent: "any"
          expected_input:
            - field: topic
              type: string
              required: true
              maps_to: "topic"
            - field: context
              type: string
              required: true
              maps_to: "context"
        - agent: wargaming-agent
          expected_input:
            - field: strategic_question
              type: string
              required: true
              maps_to: "topic"
            - field: market_context
              type: string
              required: false
              maps_to: "context"
    as_sender:
      guarantees:
        - field: perspective_summary
          type: object
          always_present: true
          description: "One sentence per hat (white, red, black, yellow, green, blue)"
        - field: key_insights
          type: array
          always_present: true
          description: "Top 3 cross-hat insights"
        - field: recommended_action
          type: string
          always_present: true
          description: "Clear next step"
        - field: blind_spots
          type: array
          always_present: true
          description: "What the analysis might be missing"
        - field: confidence
          type: string
          always_present: true
          description: "Confidence level: high, medium, or low"
      ready_condition: "perspective_summary has all 6 hat keys populated and key_insights has at least 1 item"

  human_in_the_loop_conditions:
    - Review recommended for high-stakes decisions
    - User should validate White Hat facts independently
    - Red Hat outputs should be treated as starting points for self-reflection
    - Green Hat ideas need feasibility validation by domain experts

  memory:
    conversation: "Current thinking session state"
    working:
      - Facts gathered under White Hat
      - Emotions surfaced under Red Hat
      - Risks identified under Black Hat
      - Benefits found under Yellow Hat
      - Ideas generated under Green Hat
    persistent:
      - User's recurring blind spots
      - Preferred hat sequences for different decision types
      - Previously analyzed topics for follow-up sessions
    shared:
      - Factual analysis passed to research agents
      - Risk assessment shared with planning agents
      - Multi-perspective analysis shared with design thinking agent for solution framing

  context:
    strategy: "Each hat must have clean separation. Mixing perspectives defeats the purpose."
    token_budget: 8000
    reserve_for_references: 3000
    priority_order:
      - System prompt with Six Hats framework rules
      - Current hat being analyzed (one at a time)
      - User's topic, context, and constraints
      - Framework reference (hat definitions, sequencing guide)
      - Previous hat outputs (for Blue Hat synthesis)
    include:
      - Six Hats framework definitions and rules
      - Relevant hat sequencing patterns
      - User's situation and constraints
    exclude:
      - Unrelated thinking frameworks
      - Previous unrelated sessions
      - Detailed academic history of the framework

  knowledge:
    references:
      - path: references/six-hats-framework.md
        description: Six Thinking Hats framework definitions and rules
        load_when: Always
      - path: references/hat-sequencing-guide.md
        description: Optimal hat ordering patterns for different scenarios
        load_when: Always
      - path: references/glossary-and-resources.md
        description: Domain terms and external resource links
        load_when: On demand

  assets:
    - name: session_report
      filename: "{topic}-six-hats.md"
      description: Full six hats analysis report
    - name: decision_brief
      filename: "{topic}-decision.md"
      description: Decision-focused summary

  quality:
    acceptance_criteria:
      - Each hat perspective is genuinely distinct, not rephrased versions of the same point
      - Red Hat surfaces real emotions, not rationalized feelings
      - Black Hat identifies specific risks, not generic caution
      - Green Hat produces genuinely novel alternatives, not obvious suggestions
      - Blue Hat synthesizes across hats, not just summarizes them
      - blind_spots section identifies genuine gaps in the analysis
    ab_comparison_testing:
      approach: >
        Generate six hats analysis with and without the skill. Compare on:
      dimensions:
        - perspective_separation_quality
        - hat_specific_depth
        - integration_coherence
        - blind_spot_coverage
    obsolescence_detection:
      signals:
        - Users apply parallel thinking without agent scaffolding
        - LLM produces equivalent multi-perspective analysis unprompted
        - de Bono's thinking frameworks have been superseded by newer methodologies
