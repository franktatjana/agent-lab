          type: string
        - title: recommended_style
          type: object
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            properties:
              style:
                type: string
              behaviors:
                type: array
                items:
                  type: string
              rationale:
                type: string
            required: []
        - title: current_mismatch
          type: object
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            properties:
              current_approach:
                type: string
              needed_approach:
                type: string
              impact:
                type: string
            required: []
        - title: conversation_guide
          type: object
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            properties:
              opening:
                type: string
              key_questions:
                type: array
                items:
                  type: string
              listening_for:
                type: array
                items:
                  type: string
            required: []

    build-psychological-safety:
      description: Create conditions where team members can speak up, take risks, and admit mistakes
      source: prompts/build-psychological-safety.md
      inputs:
        - title: team_context
          type: string
        - title: safety_signals
          type: string
      outputs:
        - title: safety_level
          type: string
        - title: leader_behaviors
          type: object
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            properties:
              continue_doing:
                type: array
                items:
                  type: string
              start_doing:
                type: array
                items:
                  type: string
              stop_doing:
                type: array
                items:
                  type: string
            required: []
        - title: actions_this_week
          type: array
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            items:
              type: string
        - title: team_norms
          type: array
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            items:
              type: string
        - title: regression_signals
          type: array
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            items:
              type: string

  validation:
    required_dimensions:
      - name: challenge
        description: What leadership challenge are you facing?
      - name: context
        description: Role, team size, organization type
      - name: people_involved
        description: Who is involved and what's their situation?
      - name: goal
        description: What would success look like?
    on_incomplete: >
      State what's missing, provide a short preliminary analysis based on
      available information, and ask for clarification. Do not generate a
      full response from incomplete input.

  output_constraints:
    assessment: "2-3 sentences max. Name the framework or pattern at play."
    insight: "One key observation, specific to the leader's situation."
    recommendation: "Top 3 actions only, ranked by impact. One sentence each."
    action_plan: "Concrete commitments with who/what/when."
    total_word_limit: 300
    hard_rule: "If you cannot say it in one sentence, restructure your thinking."

  guardrails:
    input:
      - Reject requests for therapy, mental health, or medical advice
      - Reject requests to make decisions for the leader
    output:
      - Always include caveats about individual and contextual variation
      - Recommendations must be specific to the leader's described situation
    resource:
      - max_tool_calls: 30

  boundaries:
    - Does not replace professional coaching or therapy
    - Does not manage organizational politics or strategy
    - Does not provide HR, legal, or compliance guidance
    - Handoff to Culture Agent for cross-cultural leadership challenges
    - Handoff to Six Hats Agent for structured decision analysis
    - Handoff to Why Agent for root cause investigation
    - Handoff to Superhero Agent when coaching reveals confidence issues or need for strength-based reframing
    - Handoff to Networking Agent when leadership development requires strategic relationship building
    - Handoff to Difficult Conversations Agent when coaching reveals a high-stakes conversation that needs structured preparation
    - Handoff to Cat POV Agent when coaching reveals boundary or energy management issues that need defamiliarization

  permissions:
    - Access leadership framework databases and academic research
    - Reference GROW, Situational Leadership, Edmondson, Greenleaf, and Scott models
    - Suggest leadership style adaptations and coaching strategies
    - Generate team health and leadership style assessments
    - Create development plans with accountability mechanisms

  escalation_triggers:
    - Request involves mental health or therapy needs
    - Situation requires professional coaching or organizational development
    - Legal, HR, or compliance implications detected
    - Leader describes abusive or harmful workplace conditions
    - Request seems designed to manipulate team members

  handoffs:
    - id: to-culture-agent
      target: culture-agent
      condition:
        description: "Coaching reveals cross-cultural leadership challenges requiring cultural context"
        rule: null
      passes:
        - field: assessment
          description: "Leadership style assessment with cultural friction points"
        - field: insight
          description: "Key pattern identified related to cultural dynamics"
      context_from_input:
        - field: challenge
          description: "Leadership challenge with cultural dimension"
        - field: context
          description: "Role, team, and organization context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Culture Agent for cross-cultural coaching"
    - id: to-six-hats-agent
      target: six-hats-agent
      condition:
        description: "Coaching reveals a complex decision requiring structured multi-perspective analysis"
        rule: null
      passes:
        - field: assessment
          description: "Situation analysis for decision context"
      context_from_input:
        - field: challenge
          description: "Leadership challenge requiring decision analysis"
        - field: context
          description: "Role, team, and organization context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Six Hats Agent for decision analysis"
    - id: to-why-agent
      target: why-agent
      condition:
        description: "Coaching reveals a recurring pattern that needs structured root cause investigation"
        rule: null
      passes:
        - field: assessment
          description: "Assessment with recurring pattern identified"
        - field: insight
          description: "Key pattern or blind spot that needs root cause analysis"
      context_from_input:
        - field: challenge
          description: "Leadership challenge with root cause question"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Why Agent for root cause investigation"
    - id: to-superhero-agent
      target: superhero-agent
      condition:
        description: "Coaching reveals confidence issues or need for strength-based reframing"
        rule: null
      passes:
        - field: assessment
          description: "Assessment revealing confidence or strength identification needs"
      context_from_input:
        - field: challenge
          description: "Leadership challenge with confidence dimension"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Superhero Agent for strength-based reframing"
    - id: to-networking-agent
      target: networking-agent
      condition:
        description: "Leadership development requires strategic relationship building"
        rule: null
      passes:
        - field: action_plan
          description: "Development plan with networking component"
      context_from_input:
        - field: context
          description: "Role and organizational context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Networking Agent for relationship building strategy"
    - id: to-difficult-conversations-agent
      target: difficult-conversations-agent
      condition:
        description: "Coaching reveals a high-stakes conversation that needs structured preparation"
        rule: null
      passes:
        - field: assessment
          description: "Situation analysis identifying the conversation needed"
        - field: insight
          description: "Key pattern driving the difficult conversation"
      context_from_input:
        - field: people_involved
          description: "Who is involved and their situation"
        - field: context
          description: "Role, team, and organization context"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Difficult Conversations Agent"
    - id: to-cat-pov-agent
      target: cat-pov-agent
      condition:
        description: "Coaching reveals boundary or energy management issues that need defamiliarization"
        rule: null
      passes:
        - field: insight
          description: "Pattern related to boundaries or energy management"
      context_from_input:
        - field: challenge
          description: "Leadership challenge with boundary dimension"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Cat POV Agent for boundary perspective"
    - id: escalate-mental-health
      target: human
      condition:
        description: "Request involves mental health or therapy needs"
        rule: null
      passes:
        - field: assessment
          description: "Assessment context for professional referral"
      on_failure:
        action: return_to_user
        message: "This situation requires professional mental health support"
    - id: escalate-legal-hr
      target: human
      condition:
        description: "Legal, HR, or compliance implications detected"
        rule: null
      passes:
        - field: assessment
          description: "Assessment identifying legal/HR concerns"
      on_failure:
        action: return_to_user
        message: "This situation requires professional legal, HR, or compliance guidance"
    - id: escalate-harmful-conditions
      target: human
      condition:
        description: "Leader describes abusive or harmful workplace conditions"
        rule: null
      passes:
        - field: assessment
          description: "Assessment flagging harmful conditions"
      on_failure:
        action: return_to_user
        message: "This situation requires professional intervention for workplace safety"
    - id: escalate-manipulation
      target: human
      condition:
        description: "Request seems designed to manipulate team members"
        rule: null
      passes:
        - field: assessment
          description: "Assessment identifying manipulation indicators"
      on_failure:
        action: return_to_user
        message: "This request conflicts with the agent's coaching ethics"

  chain_contracts:
    as_receiver:
      accepts_from:
        - agent: "any"
          expected_input:
            - field: challenge
              type: string
              required: true
              maps_to: "challenge"
            - field: context
              type: string
              required: true
              maps_to: "context"
            - field: people_involved
              type: string
              required: false
              maps_to: "people_involved"
            - field: goal
              type: string
              required: false
              maps_to: "goal"
    as_sender:
      guarantees:
        - field: assessment
          type: object
          always_present: true
          description: "Leadership style profile, team dynamics, or situation analysis"
        - field: insight
          type: string
          always_present: true
          description: "Key pattern or blind spot identified"
        - field: recommendation
          type: array
          always_present: true
          description: "Top 3 actionable guidance items"
        - field: action_plan
          type: object
          always_present: false
          description: "Concrete commitments with timeline (present when coaching reaches Will phase)"
      ready_condition: "assessment.framework and insight are populated"

  human_in_the_loop_conditions:
    - Review recommended for team health assessments
    - Approval required before sharing development plan with stakeholders
    - Flag outputs when confidence is low

  memory:
    conversation: "Current coaching session state"
    working:
      - Leadership style assessment in progress
      - Team dynamics diagnosis
      - Draft action commitments
    persistent:
      - Previously assessed leadership style
      - Past coaching goals and commitments
      - Team health history and trends
    shared:
      - Leadership context passed to Culture Agent for cross-cultural challenges
      - Situation context shared with Six Hats Agent for decision analysis

  context:
    strategy: "Coaching depth requires genuine understanding before guidance"
    token_budget: 10000
    reserve_for_references: 4000
    priority_order:
      - System prompt with coaching principles and frameworks
      - Leader's challenge description and context
      - Team composition and dynamics
      - Relevant leadership framework references
      - Examples of successful coaching patterns (if needed)
    include:
      - GROW model structure for coaching conversations
      - Situational Leadership readiness levels
      - Psychological safety indicators and interventions
      - Radical Candor care/challenge framework
    exclude:
      - Exhaustive leadership theory
      - Irrelevant framework dimensions
      - Generic motivational content

  knowledge:
    references:
      - path: references/leadership-frameworks.md
        description: GROW, Situational Leadership, Psychological Safety, Servant Leadership, Radical Candor
        load_when: Always
      - path: references/leadership-archetypes.md
        description: Leadership style profiles and adaptation patterns
        load_when: Style assessment or adaptation requested
      - path: references/glossary-and-resources.md
        description: Domain terms and external resource links
        load_when: On demand

  assets:
    - name: coaching-session
      filename: "{leader}-coaching-session.md"
      description: Full coaching conversation record with commitments
    - name: development-plan
      filename: "{leader}-development-plan.md"
      description: Leadership growth plan with 30/60/90 day actions

  quality:
    acceptance_criteria:
      - Leader's own contribution to the situation is honestly identified
      - Recommendations are specific to the leader's context, not generic advice
      - Actions are concrete, time-bound, and the leader rates commitment 7+
      - Frameworks serve the conversation, not the other way around
      - No judgment, only genuine curiosity and care
    ab_comparison_testing:
      approach: >
        Generate leadership coaching output with and without the skill.
        Compare on: situational diagnosis accuracy, framework application
        depth, action plan specificity, feedback quality.
      dimensions:
        - situational_diagnosis_accuracy
        - framework_application_depth
        - action_plan_specificity
        - feedback_quality
    obsolescence_detection:
      signals:
        - Users apply leadership frameworks without coaching guidance
        - LLM produces equivalent situational leadership analysis unprompted
        - Leadership development research has superseded current models
