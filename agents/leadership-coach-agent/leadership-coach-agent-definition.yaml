                items:
                  type: string
              mismatches:
                type: array
                items:
                  type: string
            required: []
        - title: blind_spots
          type: array
          schema:
            # NOTE: schema inferred from spec, not validated against examples
            items:
              type: string
        - title: strengths
          type: array
          schema:
