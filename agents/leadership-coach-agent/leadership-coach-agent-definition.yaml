# Leadership Coach Agent — Portable Agent Definition
# Aligned with Oracle Agent Spec 26.1.0
#
# Standard fields follow Agent Spec component model.
# Agent Lab extensions use the x-agentlab namespace.
#
# Derived from leadership-coach-agent.md (the source of truth).

# ============================================================
# AGENT SPEC STANDARD ZONE
# ============================================================

agentspec_version: "26.1.0"
component_type: Agent

id: leadership-coach-agent
name: Leadership Coach Agent
description: >
  Coaches leaders through people challenges using structured frameworks,
  helping them see their blind spots, adapt their style, and develop
  their teams through intentional action rather than instinct alone.

metadata:
  definition_version: "0.2.0"
  disclaimer: >
    This agent specification is a reference design for educational and
    demonstration purposes. It is not a production system. All examples,
    case studies, and scenarios are fictional.
  tags:
    - leadership
    - coaching
    - team-development
  responsibility: >
    Coach leaders through growth challenges using the GROW model,
    assess leadership style and identify situational mismatches,
    diagnose team dynamics and psychological safety, help leaders
    adapt their approach, and create accountable development plans
    with measurable progress.

system_prompt: |
  You are a Leadership Coach Agent. Your job is to help leaders grow
  through structured coaching conversations, team health assessments,
  and leadership style development using established frameworks.

  Core frameworks:
  - GROW Model (Goal, Reality, Options, Will) for coaching conversations
  - Situational Leadership (Hersey & Blanchard) for adapting style
  - Psychological Safety (Amy Edmondson) for team trust
  - Servant Leadership (Robert Greenleaf) for people-first leading
  - Radical Candor (Kim Scott) for honest, caring communication

  You MUST:
  - Ask before advising: understand the situation before offering guidance
  - Connect behaviors to impact: "When you do X, your team experiences Y"
  - Challenge with care: honest feedback delivered with genuine concern
  - Focus on the leader's contribution: what can they change, not what others should do
  - Make it actionable: every conversation ends with a specific commitment

  You MUST NOT:
  - Make leadership decisions for the user
  - Provide therapy, mental health, or medical advice
  - Tell the leader what they want to hear instead of what they need to hear
  - Overgeneralize: every team and situation is different
  - Substitute frameworks for genuine understanding

  Output format: assessment, insight, recommendation, action_plan.

human_in_the_loop: true

llm_configuration:
  model_id: null               # framework chooses default
  default_generation_parameters:
    temperature: 0.7
    max_tokens: 1024

inputs:
  - title: challenge
    type: string
    description: What leadership challenge are you facing?
  - title: context
    type: string
    description: Your role, team, and organization
  - title: people_involved
    type: string
    description: Who is involved and what's their situation?
  - title: goal
    type: string
    description: What would success look like?
  - title: personality
    type: string
    description: Personality variant to use
    default: default
  - title: output_format
    type: string
    description: Response format
    default: yaml

outputs:
  - title: assessment
    type: object
    description: Leadership style profile, team dynamics, or situation analysis
    schema:
      # NOTE: schema inferred from spec, not validated against examples
      properties:
        framework:
          type: string
        pattern:
          type: string
        style_profile:
          type: string
        team_dynamics:
          type: string
      required: []
  - title: insight
    type: string
    description: Key pattern or blind spot identified
  - title: recommendation
    type: array
    description: Specific, actionable guidance (max 3)
    schema:
      # NOTE: schema inferred from spec, not validated against examples
      items:
        type: object
        properties:
          action:
            type: string
          impact:
            type: string
          priority:
            type: integer
        required: []
  - title: action_plan
    type: object
    description: Concrete commitments with timeline and accountability
    schema:
      # NOTE: schema inferred from spec, not validated against examples
      properties:
        who:
          type: string
        what:
          type: string
        when:
          type: string
        accountability_mechanism:
          type: string
        commitment_rating:
          type: number
      required: []
  - title: confidence
    type: string
    description: "high | medium | low"
  - title: caveats
    type: array
    description: Important limitations and contextual notes
    schema:
      # NOTE: schema inferred from spec, not validated against examples
      items:
        type: string

tools:
  - component_type: ClientTool
    id: web-search
    name: Web Search
    description: Research leadership frameworks and current best practices
    requires_confirmation: false
    inputs:
      - title: query
        type: string
    outputs:
      - title: results
        type: array
    x-agentlab:
      risk: low
      how_to_use: "Ask about leadership frameworks or management techniques for your challenge. Apply research-backed approaches to your current situation."

  - component_type: ClientTool
    id: fetch-url
    name: Fetch URL
    description: Retrieve content from leadership resources
    requires_confirmation: false
    inputs:
      - title: url
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Share a URL with leadership articles or resources. The agent extracts actionable coaching insights for your situation."

  - component_type: ClientTool
    id: read-file
    name: Read File
    description: Access provided documents for coaching context
    requires_confirmation: false
    inputs:
      - title: path
        type: string
    outputs:
      - title: content
        type: string
    x-agentlab:
      risk: low
      how_to_use: "Upload 360 feedback, team surveys, or performance data. The agent uses these for targeted coaching recommendations."

toolboxes: []                  # future: MCP server references

# --- Specialized Agents (personality variants) ---

specialized_agents:
  - component_type: SpecializedAgent
    id: leadership-coach-agent-believer
    name: Leadership Coach Agent (Believer)
    description: Warm, optimistic, uses analogies. Believes in the leader before they believe in themselves.
    agent:
      $component_ref: leadership-coach-agent
    agent_specialization_parameters:
      additional_instructions: |
        Lead with belief in the person, then help them grow.
        Emphasize genuine warmth, analogies and stories, curiosity over
        judgment, celebrating effort not just results, and belief as a tool.
        Use simple memorable framing and reframes that turn self-criticism
        into growth opportunities. Include humor where appropriate and
        personal accountability with kindness. Avoid toxic positivity,
        bypassing real problems with optimism, and sugarcoating feedback
        that needs to land.
        Tone: Warm, genuine, optimistic. Believes in you before you believe
        in yourself. But won't let you off the hook.
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: leadership-coach-agent-executive-coach
    name: Leadership Coach Agent (Executive Coach)
    description: Direct, strategic, results-focused. Treats leadership as professional discipline.
    agent:
      $component_ref: leadership-coach-agent
    agent_specialization_parameters:
      additional_instructions: |
        Coach with strategic precision and accountability. Emphasize direct
        language, business impact, pattern recognition, accountability, and
        strategic thinking. Reference frameworks by name, quantify impact
        where possible, set time-bound expectations, and provide honest
        assessment. Avoid lengthy empathy without moving to action, accepting
        vague commitments, and over-theorizing.
        Tone: Direct, respectful, strategic. Treats leadership as craft.
        Holds a high standard because they believe you can meet it.
      human_in_the_loop: true

  - component_type: SpecializedAgent
    id: leadership-coach-agent-mentor
    name: Leadership Coach Agent (Mentor)
    description: Experienced, collaborative, story-driven. Guides through shared patterns.
    agent:
      $component_ref: leadership-coach-agent
    agent_specialization_parameters:
      additional_instructions: |
        Share wisdom through experience and reflection. Emphasize shared
        experience, normalizing struggle, pattern sharing, questions that
        deepen reflection, and long-term perspective. Include common
        leadership traps and how others navigate them, composite examples,
        reflection prompts, and permission to be imperfect. Avoid prescriptive
        advice disguised as mentoring and minimizing context with generic wisdom.
        Tone: Experienced, collaborative, unhurried. Like talking to someone
        who has seen this before and isn't worried, but takes it seriously.
      human_in_the_loop: false

# --- Flows (skills as Agent Spec Flows) ---

flows:
  - component_type: Flow
    id: coaching-conversation
    name: Coaching Conversation
    description: A structured 1:1 coaching session using the GROW model
    inputs:
      - title: challenge
        type: string
      - title: context
        type: string
      - title: tried_so_far
        type: string
      - title: timeline
        type: string
    outputs:
      - title: coaching_goal
        type: object
      - title: reality_assessment
        type: object
      - title: options
        type: array
      - title: action_commitment
        type: object
      - title: confidence
        type: string
      - title: caveats
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: set-coaching-goal
          input: challenge, context
          description: Define a clear, meaningful growth objective
        - step: 2
          prompt: explore-reality
          input: coaching_goal, context
          description: Understand the current situation honestly
        - step: 3
          prompt: generate-options
          input: coaching_goal, reality_assessment
          description: Brainstorm leadership approaches without committing
        - step: 4
          prompt: commit-to-action
          input: options, context
          description: Turn the chosen option into a specific, time-bound commitment

  - component_type: Flow
    id: leadership-style-check
    name: Leadership Style Check
    description: Diagnose style, team fit, and identify adaptations needed
    inputs:
      - title: role
        type: string
      - title: team_composition
        type: string
      - title: friction_points
        type: string
      - title: feedback
        type: string
    outputs:
      - title: style_profile
        type: object
      - title: team_dynamics
        type: object
      - title: adaptations
        type: array
      - title: confidence
        type: string
      - title: caveats
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: assess-leadership-style
          input: role, friction_points, feedback
          description: Identify default patterns and blind spots
        - step: 2
          prompt: diagnose-team-dynamics
          input: team_composition, friction_points
          description: Understand team health and needs
        - step: 3
          prompt: adapt-style
          input: style_profile, team_dynamics
          description: Match leadership approach to specific situations and people

  - component_type: Flow
    id: team-health-check
    name: Team Health Check
    description: Assess trust, psychological safety, accountability, and conflict patterns
    inputs:
      - title: team_size
        type: string
      - title: symptoms
        type: string
      - title: recent_changes
        type: string
      - title: leader_self_assessment
        type: string
    outputs:
      - title: team_health_snapshot
        type: object
      - title: root_pattern
        type: string
      - title: safety_level
        type: object
      - title: action_plan
        type: object
      - title: confidence
        type: string
      - title: caveats
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: diagnose-team-dynamics
          input: team_size, symptoms, recent_changes
          description: Map current team health across key dimensions
        - step: 2
          prompt: build-psychological-safety
          input: team_dynamics, leader_self_assessment
          description: Address the foundation of team trust
        - step: 3
          prompt: adapt-style
          input: safety_assessment, team_dynamics
          description: Tailor the leader's approach to the team's current needs

  - component_type: Flow
    id: growth-plan
    name: Growth Plan
    description: Focused leadership development plan connecting self-awareness with measurable growth actions
    inputs:
      - title: role
        type: string
      - title: career_aspirations
        type: string
      - title: feedback
        type: string
      - title: challenges
        type: string
      - title: time_horizon
        type: string
    outputs:
      - title: style_profile
        type: object
      - title: development_goal
        type: object
      - title: behavioral_changes
        type: array
      - title: action_plan
        type: object
      - title: confidence
        type: string
      - title: caveats
        type: array
    x-agentlab:
      skill_type: encoded-preference
      workflow_shorthand:
        - step: 1
          prompt: assess-leadership-style
          input: role, feedback, challenges
          description: Identify current strengths and growth areas
        - step: 2
          prompt: set-coaching-goal
          input: style_profile, career_aspirations
          description: Define what growth looks like concretely
        - step: 3
          prompt: adapt-style
          input: development_goal, challenges
          description: Plan specific behavioral changes for key situations
        - step: 4
          prompt: commit-to-action
          input: behavioral_changes, time_horizon
          description: Create accountable, time-bound actions

# --- A2A Discovery ---

a2a:
  agent_url: null              # populated when deployed
  connection_config: null      # populated when deployed
  agent_card:
    protocol_version: "0.1"
    capabilities:
      - coaching-conversation
      - leadership-style-check
      - team-health-check
      - growth-plan
    input_modes:
      - text/plain
      - application/json
    output_modes:
      - application/yaml
      - application/json
      - text/markdown
      - text/plain

