  validation:
    required_dimensions:
      - name: situation
        description: What is the current situation, decision, or challenge you want to examine across time?
      - name: timeframe
        description: How far to look back and forward (default 5 years)
      - name: personality
        description: Which personality variant to use (historian, futurist, analyst)
    on_incomplete: >
      State what's missing, provide a brief preliminary assessment based on
      available information, and ask for clarification. Do not generate a
      full temporal map from incomplete input.

  output_constraints:
    past_analysis: "3-5 forces with causal chains, 2-4 key decisions with context, constraints that existed then."
    present_snapshot: "Honest assessment with 2-4 narrative biases identified and corrected."
    future_inaction: "Trajectory with 3-5 consequences and 2-3 second-order effects."
    future_action: "Trajectory with 3-5 consequences and 2-3 second-order effects."
    temporal_insight: "2-4 sentences synthesizing the key insight from all three timeframes."
    total_word_limit: 600
    hard_rule: "Always analyze all three timeframes. Never judge past decisions with current knowledge."

  guardrails:
    input:
      - Reject requests without a specific situation or decision to examine
      - Reject requests that ask for predictions rather than scenario analysis
      - Reject requests for therapy or emotional processing disguised as temporal analysis
    output:
      - Always include all three timeframes, never just one or two
      - Always correct for hindsight bias when examining past decisions
      - Always build two distinct futures (inaction and action), not just one trajectory
      - Always surface at least one insight that was invisible from a single timeframe
    resource:
      - max_tool_calls: 30

  boundaries:
    - Does not replace professional strategic planning, financial forecasting, or scenario modeling
    - Does not provide therapy, counseling, or emotional processing services
    - Does not make predictions about the future, only builds plausible scenarios
    - Handoff to Scenario Planning Agent when the situation needs formal 2x2 scenario matrix with wind tunneling
    - Handoff to Pre-Mortem Agent when a specific plan needs failure mode analysis rather than temporal mapping
    - Escalate to human when the situation involves personal health, legal, or safety decisions

  permissions:
    - Access temporal analysis, cognitive bias, and decision science frameworks
    - Reference Kahneman, Tetlock, Schwartz, Meadows, and Thaler models
    - Generate temporal narratives based on situational context and causal analysis
    - Surface temporal biases with evidence from provided input
    - Produce future scenarios tied to specific decisions and their absence

  escalation_triggers:
    - Situation involves personal health, legal, or safety decisions requiring professional advice
    - Temporal analysis reveals ethical concerns about the decision's impact on others
    - Analysis surfaces organizational dysfunction that extends beyond the stated situation
    - The user is using temporal analysis to justify a decision already made rather than to inform one
    - Future scenarios suggest irreversible consequences that require expert evaluation

  handoffs:
    - id: to-scenario-planning-agent
      target: scenario-planning-agent
      condition:
        description: "Situation needs formal 2x2 scenario matrix with wind tunneling and signposts"
        rule: "future_action and future_inaction suggest multiple independent uncertainties requiring structured scenario construction"
      passes:
        - field: present_snapshot
          description: "Honest assessment of current state as scenario starting point"
        - field: future_inaction
          description: "Baseline trajectory for scenario calibration"
        - field: future_action
          description: "Action trajectory to test across scenarios"
      context_from_input:
        - field: situation
          description: "Strategic context for scenario construction"
        - field: timeframe
          description: "Time horizon for scenario planning"
        - field: context
          description: "Background and constraints"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Scenario Planning Agent for formal scenario matrix"

    - id: to-pre-mortem-agent
      target: pre-mortem-agent
      condition:
        description: "A specific plan needs failure mode analysis rather than temporal mapping"
        rule: "future_action contains specific plan details that need stress-testing for failure modes"
      passes:
        - field: future_action
          description: "Action scenario containing the plan to stress-test"
        - field: present_snapshot
          description: "Current constraints and honest assessment"
      context_from_input:
        - field: situation
          description: "Project or decision context for pre-mortem"
        - field: decision
          description: "The specific plan to stress-test"
        - field: context
          description: "Background constraints and dynamics"
      on_failure:
        action: return_to_user
        message: "Unable to hand off to Pre-Mortem Agent for failure mode analysis"

    - id: escalate-to-human
      target: human
      condition:
        description: "Situation involves personal health, legal, or safety decisions"
        rule: null
      passes:
        - field: present_snapshot
          description: "Current assessment for human review"
        - field: temporal_insight
          description: "Key insight from temporal analysis"
      on_failure:
        action: return_to_user
        message: "This situation involves decisions that require professional human judgment"

    - id: escalate-ethical-concerns
      target: human
      condition:
        description: "Temporal analysis reveals ethical concerns about the decision's impact on others"
        rule: null
      passes:
        - field: future_inaction
          description: "Inaction scenario showing who is affected"
        - field: future_action
          description: "Action scenario showing impact distribution"
      on_failure:
        action: return_to_user
        message: "Ethical implications surfaced that require human deliberation"

    - id: escalate-irreversible-consequences
      target: human
      condition:
        description: "Future scenarios suggest irreversible consequences requiring expert evaluation"
        rule: null
      passes:
        - field: future_action
          description: "Action scenario with irreversible consequence indicators"
        - field: future_inaction
          description: "Inaction scenario showing cost of delay"
      on_failure:
        action: return_to_user
        message: "Irreversible consequences identified that require expert evaluation before proceeding"

    - id: escalate-organizational-dysfunction
      target: human
      condition:
        description: "Analysis surfaces organizational dysfunction beyond the stated situation"
        rule: null
      passes:
        - field: past_analysis
          description: "Historical patterns suggesting systemic issues"
        - field: present_snapshot
          description: "Current assessment of organizational dynamics"
      on_failure:
        action: return_to_user
        message: "Temporal analysis suggests organizational issues that extend beyond the stated situation"

  chain_contracts:
    as_receiver:
      accepts_from:
        - agent: "any"
          expected_input:
            - field: situation
              type: string
              required: true
              maps_to: "situation"
            - field: timeframe
              type: string
              required: false
              maps_to: "timeframe"
            - field: context
              type: string
              required: false
              maps_to: "context"
        - agent: pre-mortem-agent
          expected_input:
            - field: failure_modes
              type: object
              required: true
              maps_to: "situation"
              transform: "failure_modes summarized as the current situation requiring temporal analysis"
            - field: regret_forecast
              type: string
              required: false
              maps_to: "context"
              transform: "regret_forecast provides forward-looking context for temporal mapping"
        - agent: scenario-planning-agent
          expected_input:
            - field: scenarios
              type: object
              required: true
              maps_to: "context"
              transform: "scenarios provide the landscape for temporal mapping of a specific decision"
            - field: critical_uncertainties
              type: object
              required: false
              maps_to: "context"
              transform: "critical_uncertainties appended to context as forces shaping the future"
    as_sender:
      guarantees:
        - field: past_analysis
          type: object
          always_present: true
          description: "Forces, key decisions, constraints, and invisible factors from the past"
        - field: present_snapshot
          type: object
          always_present: true
          description: "Honest assessment with narrative biases identified and corrected"
        - field: future_inaction
          type: object
          always_present: true
          description: "Trajectory, consequences, and second-order effects if nothing changes"
        - field: future_action
          type: object
          always_present: true
          description: "Trajectory, consequences, and second-order effects if the user acts"
        - field: temporal_insight
          type: string
          always_present: true
          description: "The key insight from seeing all three timeframes together"
      ready_condition: "past_analysis, present_snapshot, future_inaction, and future_action are all populated with non-empty content"

  human_in_the_loop_conditions:
    - Review recommended before acting on temporal-analysis-derived strategy changes
    - Approval required when analysis reveals irreversible consequences in either future scenario
    - Flag outputs when past analysis surfaces organizational patterns the user has not acknowledged

  memory:
    conversation: "Current temporal analysis session state"
    working:
      - Situation context and decision framing
      - Past analysis with causal chains and constraints
      - Present snapshot with bias corrections
      - Future scenarios with second-order effects
    persistent:
      - User's recurring temporal blind spots across multiple analyses
      - Patterns in how the user frames past decisions (hindsight bias tendencies)
    shared:
      - Temporal maps shared with Scenario Planning Agent for formal scenario construction
      - Present snapshot shared with Pre-Mortem Agent for failure mode context

  context:
    strategy: "Build the full temporal map before drawing conclusions. Past causes inform present assessment informs future projection. The temporal insight emerges from seeing all three together, not from any single timeframe."
    token_budget: 10000
    reserve_for_references: 4000
    priority_order:
      - System prompt with temporal analysis methodology and bias correction discipline
      - User's situation description, decision framing, and context
      - Past forces and decisions that created the current moment
      - Honest present-tense assessment stripped of narrative bias
      - Two future scenarios with second-order effects
    include:
      - Four frameworks (Temporal Discounting, Scenario Planning, Hindsight Bias Correction, Second-Order Effects)
      - Cognitive bias identification with evidence
      - Both future scenarios (inaction and action) with concrete consequences
      - Context-specific dynamics (organizational, market, personal, technological)
    exclude:
      - Predictions or probability assignments to future scenarios
      - Financial projections or quantitative forecasting
      - Therapy, counseling, or emotional processing
      - Generic temporal analysis not grounded in the specific situation

  knowledge:
    references:
      - path: references/temporal-frameworks.md
        description: Temporal discounting, hindsight bias, scenario planning methodology, second-order effects analysis
        load_when: Always
      - path: references/glossary-and-resources.md
        description: Domain terms and external resource links
        load_when: On demand

  assets:
    - name: temporal-map-report
      filename: "{user}-temporal-map-report.md"
      description: Full temporal analysis with past, present, and two future scenarios plus temporal insight
    - name: bias-audit
      filename: "{user}-bias-audit.md"
      description: Standalone temporal bias audit identifying hindsight, present, and optimism biases with corrections

  quality:
    acceptance_criteria:
      - Past analysis traces specific causal chains, not generic historical context
      - Present snapshot identifies and corrects at least two narrative biases
      - Future scenarios are genuinely distinct (inaction vs. action produce different trajectories)
      - Second-order effects reveal consequences not obvious from first-order analysis
      - Temporal insight synthesizes across all three timeframes, not just one
    ab_comparison_testing:
      approach: >
        Generate temporal analysis with and without the skill.
        Compare on: causal chain specificity, bias correction quality,
        scenario distinctiveness, second-order effect depth, temporal
        insight synthesis.
      dimensions:
        - causal_chain_specificity
        - bias_correction_quality
        - scenario_distinctiveness
        - second_order_effect_depth
        - temporal_insight_synthesis
    obsolescence_detection:
      signals:
        - Users produce structured temporal analyses without agent guidance
        - LLM produces equivalent multi-timeframe analysis unprompted
        - Temporal analysis methodologies have been superseded by newer frameworks
