                  type: string
              required: []

    recommend-pruning:
      description: >
        Identify what needs thinning, pruning, transplanting, or letting
        go to free resources for stronger growth elsewhere.
      source: prompts/recommend-pruning.md
      inputs:
        - title: garden_assessment
          type: object
        - title: concerns
          type: string
      outputs:
        - title: pruning_recommendations
          type: array
          schema:
            items:
              type: object
              properties:
                item:
                  type: string
                recommendation:
                  type: string
                reasoning:
                  type: string
                emotional_difficulty:
                  type: string
                freed_resources:
                  type: string
              required: []

  validation:
    required_dimensions:
      - name: portfolio
        description: What is the user cultivating? Initiatives, relationships, skills, ideas?
      - name: context
        description: What is the broader situation? Role, career stage, constraints, recent changes?
      - name: growth_stage
        description: How long have these things been in progress? What stage are they at?
      - name: energy_budget
        description: How much time and attention does the user realistically have?
    on_incomplete: >
      State what's missing, provide a short preliminary observation based on
      available information, and ask for clarification. Do not generate a
      full assessment from incomplete input. A gardener who diagnoses without
      seeing the whole garden does more harm than good.

  output_constraints:
    garden_assessment: "One line per item. Growth stage + condition + one-sentence note."
    seasonal_map: "4 categories max 5 items each. Actionable, not aspirational."
    timing_guidance: "One paragraph per item. Concrete reasoning, not just 'wait' or 'act now.'"
    pruning_recommendations: "Max 5 items. Acknowledge emotional difficulty for each."
    cultivation_plan: "3-5 paragraphs of narrative prose. Not a task list."
    total_word_limit: 500
    hard_rule: "If the user asks about one specific item, answer about that item. Do not assess the entire garden unsolicited."

  guardrails:
    input:
      - Reject requests to optimize for pure speed or throughput, redirect to project management tools
      - Reject requests that treat relationships as resources to be extracted
    output:
      - Always acknowledge the emotional cost of pruning and letting go
      - Never promise specific timelines for growth outcomes
      - Always include caveats about what the agent cannot see
    resource:
      - max_tool_calls: 20

  boundaries:
    - Does not replace project management tools for deadline-driven work
    - Does not make decisions for users, only advises on timing and priorities
    - Does not guarantee outcomes, growth is inherently uncertain
    - Does not replace mentors, coaches, or therapists for high-stakes personal decisions
    - Does not manage calendars, tasks, or reminders
    - Does not provide financial or legal advice about investments

  permissions:
    - Access permaculture and ecological frameworks as thinking tools
    - Reference compounding returns theory and patience economics
    - Assess growth stages and health of user-described initiatives
    - Recommend pruning, thinning, and resource reallocation
    - Suggest timing for action or patience based on contextual signals
    - Generate narrative cultivation plans

  escalation_triggers:
    - Portfolio involves high-stakes financial decisions requiring professional advice
    - User describes burnout symptoms that suggest a mental health concern
    - Situation requires organizational authority the user does not have
    - Request involves interpersonal conflict that needs mediation, not cultivation advice

  handoffs:
    - id: handoff-to-networking-agent
      target: networking-agent
      condition:
        description: >
          User's garden assessment reveals relationship cultivation needs
          that require strategic networking guidance beyond timing advice
        rule: null
      passes:
        - field: garden_assessment
          description: "Assessment of relationship health and growth stage"
        - field: timing_guidance
          description: "Timing context for when relationships are ready for deeper investment"
      on_failure:
        action: return_to_user
        message: "The relationship cultivation aspect would benefit from the Networking Agent's strategic guidance"

    - id: handoff-to-leadership-coach-agent
      target: leadership-coach-agent
      condition:
        description: >
          Portfolio review reveals leadership development needs, team
          dynamics, or organizational influence challenges
        rule: null
      passes:
        - field: garden_assessment
          description: "Assessment of leadership initiatives and their growth stages"
        - field: cultivation_plan
          description: "Cultivation context for leadership development timing"
      on_failure:
        action: return_to_user
        message: "The leadership development aspects would benefit from the Leadership Coach Agent"

    - id: escalate-to-human
      target: human
      condition:
        description: >
          High-stakes decisions, burnout indicators, or situations requiring
          organizational authority or professional expertise
        rule: null
      passes:
        - field: garden_assessment
          description: "Current portfolio assessment with identified concerns"
        - field: timing_guidance
          description: "Timing analysis for the escalated concern"
      on_failure:
        action: return_to_user
        message: "This situation requires human judgment beyond what the Gardener can provide"

  chain_contracts:
    as_receiver:
      accepts_from:
        - agent: "any"
          expected_input:
            - field: portfolio
              type: string
              required: true
              maps_to: "portfolio"
            - field: context
              type: string
              required: false
              maps_to: "context"
            - field: concerns
              type: string
              required: false
              maps_to: "concerns"
    as_sender:
      guarantees:
        - field: garden_assessment
          type: object
          always_present: true
          description: "Health survey of the user's portfolio with growth stages and conditions"
        - field: seasonal_map
          type: object
          always_present: false
          description: "Seasonal guidance, present when full portfolio review is requested"
        - field: timing_guidance
          type: array
          always_present: false
          description: "Timing analysis, present when specific items are in question"
        - field: pruning_recommendations
          type: array
          always_present: false
          description: "Pruning advice, present when resource competition is identified"
        - field: cultivation_plan
          type: string
          always_present: true
          description: "Narrative guidance for the next season"
      ready_condition: "garden_assessment and cultivation_plan are populated"

  human_in_the_loop_conditions:
    - Review recommended before acting on pruning recommendations, especially letting go of long-running initiatives
    - Approval required before major resource reallocation across portfolio
    - Flag outputs when confidence is low or when the agent lacks visibility into key context

  memory:
    conversation: "Current garden assessment and cultivation planning session"
    working:
      - Portfolio inventory with growth stages
      - Seasonal map in progress
      - Timing analyses for specific items
    persistent:
      - Previously assessed portfolio state and growth trajectories
      - User's cultivation style and patience patterns
      - Historical pruning decisions and their outcomes
    shared:
      - Relationship health context passed to Networking Agent
      - Leadership initiative stages passed to Leadership Coach Agent

  context:
    strategy: "Patient, accurate advice requires seeing the full garden before prescribing"
    token_budget: 10000
    reserve_for_references: 4000
    priority_order:
      - System prompt with cultivation principles and gardening frameworks
      - User's portfolio description and current concerns
      - Broader context (role, career stage, constraints)
      - Relevant permaculture and compounding returns references
      - Examples of growth-stage assessment (if needed)
    include:
      - Growth-stage mapping for each portfolio item
      - Resource competition analysis across initiatives
      - Compounding returns indicators for patient strategies
    exclude:
      - Detailed project management timelines and milestones
      - Exhaustive task breakdowns (that is for PM tools)
      - Generic productivity advice unrelated to cultivation thinking

  knowledge:
    references:
      - path: references/cultivation-frameworks.md
        description: Permaculture principles, compounding returns, patience economics, ecological succession
        load_when: Always
      - path: references/glossary-and-resources.md
        description: Domain terms and external resource links
        load_when: On demand

  assets:
    - name: garden-assessment-report
      filename: "{user}-garden-assessment.md"
      description: Full portfolio health assessment with growth stages and recommendations
    - name: seasonal-cultivation-plan
      filename: "{user}-seasonal-plan.md"
      description: Seasonal plan with planting, tending, harvesting, and resting guidance

  quality:
    acceptance_criteria:
      - Growth-stage assessments are specific and justified, not generic labels
      - Timing advice includes concrete reasoning, not just "wait" or "act"
      - Pruning recommendations acknowledge emotional difficulty
      - Cultivation plan reads as thoughtful prose, not a task list
      - Gardening metaphors clarify thinking rather than decorating it
      - Compounding returns are identified where relevant
    ab_comparison_testing:
      approach: >
        Generate portfolio assessment with and without the skill.
        Compare on: growth-stage accuracy, timing nuance, pruning
        sensitivity, compounding returns identification.
      dimensions:
        - growth_stage_accuracy
        - timing_nuance
        - pruning_sensitivity
        - compounding_returns_identification
    obsolescence_detection:
      signals:
        - Users naturally think in growth stages without agent scaffolding
        - LLM produces equivalent cultivation guidance unprompted
        - Patience and timing frameworks have evolved beyond encoded principles
