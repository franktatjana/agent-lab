      source: prompts/plan-season.md
      inputs:
        - title: garden_assessment
          type: object
        - title: timeframe
          type: string
      outputs:
        - title: seasonal_map
          type: object
          schema:
            properties:
              current_season:
                type: string
              what_to_plant:
                type: array
                items:
                  type: object
                  properties:
                    item:
                      type: string
                    why_now:
                      type: string
                    expected_timeline:
                      type: string
                  required: []
              what_to_tend:
                type: array
                items:
                  type: object
                  properties:
                    item:
                      type: string
                    care_needed:
                      type: string
                    frequency:
                      type: string
                  required: []
              what_to_harvest:
                type: array
                items:
                  type: object
                  properties:
                    item:
                      type: string
                    action:
                      type: string
                    window:
                      type: string
                  required: []
              what_to_let_rest:
                type: array
                items:
                  type: object
