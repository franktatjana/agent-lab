# AGENT LAB EXTENSIONS (x-agentlab namespace)
# ============================================================

x-agentlab:

  fallback_model: null

  prompt_registry:
    identify-stakeholders:
      description: Identify key players, roles, interests, and initial stance for a situation
      source: prompts/identify-stakeholders.md
      inputs:
        - title: situation
          type: string
        - title: organization_context
          type: string
        - title: your_role
          type: string
      outputs:
        - title: stakeholders
          type: array
          schema:
            items:
              type: object
              properties:
                name:
                  type: string
                role:
                  type: string
                interest:
                  type: string
                stance:
                  type: string
                  enum: [supportive, opposed, neutral, skeptical, undecided]
              required: [name, role, interest, stance]

    assess-influence:
      description: Map formal authority and informal influence for identified stakeholders
      source: prompts/assess-influence.md
      inputs:
        - title: stakeholders
          type: array
        - title: organization_context
          type: string
      outputs:
        - title: influence_assessment
          type: array
          schema:
            items:
              type: object
              properties:
                name:
                  type: string
                formal_authority:
                  type: string
                  enum: [high, medium, low]
                informal_influence:
                  type: string
                  enum: [high, medium, low]
              required: [name, formal_authority, informal_influence]

    analyze-political-landscape:
      description: Name the political dynamics at play (gatekeeping, coalition, sponsorship, etc.)
      source: prompts/analyze-political-landscape.md
      inputs:
        - title: situation
          type: string
        - title: stakeholders_with_influence
          type: array
        - title: organization_context
          type: string
      outputs:
        - title: dynamics
          type: array
          schema:
            items:
              type: object
              properties:
                dynamic:
                  type: string
                description:
                  type: string
                players_involved:
                  type: array
                  items:
                    type: string
              required: [dynamic, description]

    identify-risks:
      description: Surface political risks, hidden agendas, and potential blockers
      source: prompts/identify-risks.md
      inputs:
        - title: situation
          type: string
        - title: stakeholders
          type: array
        - title: planned_actions
          type: string
      outputs:
        - title: risks
          type: array
          schema:
            items:
              type: object
              properties:
                risk:
                  type: string
                likelihood:
                  type: string
                  enum: [high, medium, low]
                mitigation:
                  type: string
              required: [risk]

    plan-influence-strategy:
      description: Create ethical, sequenced engagement plans for gaining stakeholder support
      source: prompts/plan-influence-strategy.md
      inputs:
        - title: goal
          type: string
        - title: stakeholders_with_positions
          type: array
        - title: constraints
          type: string
        - title: timeline
          type: string
      outputs:
        - title: strategy
          type: object
          # NOTE: schema inferred from spec, not validated against examples
          schema:
            properties:
              approach:
                type: string
              stakeholder_actions:
                type: array
                items:
                  type: object
                  properties:
                    stakeholder:
                      type: string
                    action:
                      type: string
                    timing:
                      type: string
                  required: [stakeholder, action]
              sequence:
                type: array
                items:
                  type: string
            required: [approach, stakeholder_actions]

  validation:
    required_dimensions:
      - name: organization_context
        description: What kind of company is this? Size, culture, industry?
      - name: your_role
        description: What is your position, tenure, and reporting structure?
      - name: situation
        description: What is happening and what is at stake?
      - name: key_stakeholders
        description: Who are the relevant players and their positions?
    on_incomplete: >
      State what's missing, provide a short preliminary analysis based on
      available information, and ask for clarification. Do not generate a
      full response from incomplete input.

  output_constraints:
    landscape: "2-3 sentences max. Name the political dynamic at play."
    key_players: "Max 3 stakeholders. One line each with interest, influence, stance."
    recommendations: "Top 3 actions only, ranked by impact. One sentence each."
    risk: "One sentence on what to watch out for."
    total_word_limit: 300
    hard_rule: "If you cannot say it in one sentence, restructure your thinking."

  guardrails:
    input:
      - Reject requests for manipulation tactics, harassment strategies, or deception
    output:
      - Always include confidence level and caveats about individual variation
    process:
      - Flag when the user's framing suggests a problem beyond politics (legal, ethical, safety)
    resource:
      - max_tool_calls: 30

  boundaries:
    - Does not provide legal, HR, or compliance advice
    - Does not make decisions for the user
    - Does not encourage manipulation, deception, or unethical behavior
    - Does not guarantee career outcomes or promotion timelines
    - Handoff to Culture Agent when national/regional cultural dynamics are the primary factor
    - Handoff to Why Agent when root cause analysis is needed beyond political dynamics
    - Handoff to Question Decoder Agent when the challenge is framing a response, not understanding the landscape
    - Handoff to Difficult Conversations Agent when stakeholder strategy requires preparing a difficult one-on-one conversation
    - Handoff to Cat POV Agent when political analysis could benefit from a fresh perspective on territorial behavior
    - Handoff to Wargaming Agent when competitive or political analysis needs adversarial simulation to stress-test strategy

  permissions:
    - Map stakeholder interests, influence, and relationships
    - Name political dynamics explicitly
    - Suggest ethical influence and engagement strategies
    - Generate stakeholder maps and political landscape analyses
    - Recommend career development strategies with political awareness
    - Provide tactical advice for specific corporate scenarios

  escalation_triggers:
    - Signs of workplace harassment or discrimination (advise professional HR/legal counsel)
    - Ethical violations being described as "politics" (flag the distinction)
    - Mental health concerns (burnout, anxiety) beyond normal stress (advise professional support)
    - Requests for deception or manipulation (refuse and explain why)

  handoffs:
    - id: to-culture-agent
      target: culture-agent
      condition:
        description: "National or regional cultural dynamics are the primary factor in the political landscape"
        rule: null
      passes:
        - field: landscape
          description: "Political landscape summary with cultural dimensions identified"
        - field: key_players
          description: "Stakeholder map with stances and interests"
      context_from_input:
        - field: organization_context
          description: "Company type, culture, size"
        - field: situation
          description: "What is happening and what is at stake"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Culture Agent. Consider cultural dynamics when interpreting the stakeholder map."

    - id: to-why-agent
      target: why-agent
      condition:
        description: "Root cause analysis is needed beyond political dynamics"
        rule: null
      passes:
        - field: landscape
          description: "Political landscape context"
        - field: key_players
          description: "Stakeholder analysis showing unclear motivations"
      context_from_input:
        - field: situation
          description: "Situation description"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Why Agent. Investigate root causes beyond the political surface yourself."

    - id: to-question-decoder
      target: question-decoder-agent
      condition:
        description: "The challenge is framing a response, not understanding the landscape"
        rule: null
      passes:
        - field: landscape
          description: "Political context for the response"
        - field: recommendations
          description: "Strategic direction to inform response framing"
      context_from_input:
        - field: situation
          description: "Situation requiring a response"
        - field: your_role
          description: "User's position and context"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Question Decoder. Use the recommendations to frame your response."

    - id: to-difficult-conversations
      target: difficult-conversations-agent
      condition:
        description: "Stakeholder strategy requires preparing a difficult one-on-one conversation"
        rule: null
      passes:
        - field: key_players
          description: "Stakeholder profiles for conversation preparation"
        - field: recommendations
          description: "Strategic context for the conversation"
      context_from_input:
        - field: situation
          description: "Situation driving the conversation"
        - field: your_role
          description: "User's position and relationship"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Difficult Conversations Agent. Use the stakeholder analysis to prepare your conversation."

    - id: to-cat-pov
      target: cat-pov-agent
      condition:
        description: "Political analysis could benefit from a fresh perspective on territorial behavior"
        rule: null
      passes:
        - field: landscape
          description: "Political landscape to reframe through territorial lens"
      context_from_input:
        - field: situation
          description: "Workplace situation"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Cat POV Agent. Consider territorial dynamics in your stakeholder analysis."

    - id: to-wargaming
      target: wargaming-agent
      condition:
        description: "Competitive or political analysis needs adversarial simulation to stress-test strategy"
        rule: null
      passes:
        - field: key_players
          description: "Stakeholder positions for adversarial modeling"
        - field: recommendations
          description: "Strategy to stress-test"
      context_from_input:
        - field: situation
          description: "Situation context"
        - field: constraints
          description: "Things that cannot be changed"
      on_failure:
        action: return_to_user
        message: "Could not hand off to Wargaming Agent. Consider stress-testing your strategy yourself."

    - id: to-human-harassment
      target: human
      condition:
        description: "Signs of workplace harassment or discrimination"
        rule: null
      passes:
        - field: landscape
          description: "Initial assessment noting the concern"
      context_from_input:
        - field: situation
          description: "Original situation description"
      on_failure:
        action: return_to_user
        message: "This situation involves potential harassment or discrimination. Seek professional HR or legal counsel."

    - id: to-human-ethics
      target: human
      condition:
        description: "Ethical violations being described as politics"
        rule: null
      passes:
        - field: landscape
          description: "Assessment distinguishing ethics from politics"
      context_from_input:
        - field: situation
          description: "Original situation description"
      on_failure:
        action: return_to_user
        message: "This situation involves ethical concerns beyond politics. Seek appropriate professional guidance."

    - id: to-human-mental-health
      target: human
      condition:
        description: "Mental health concerns beyond normal workplace stress"
        rule: null
      passes:
        - field: landscape
          description: "Assessment noting concerning patterns"
      context_from_input:
        - field: situation
          description: "Original situation description"
      on_failure:
        action: return_to_user
        message: "This situation suggests mental health concerns. Seek professional support."

  chain_contracts:
    as_receiver:
      accepts_from:
        - agent: "any"
          expected_input:
            - field: organization_context
              type: string
              required: true
              maps_to: "organization_context"
            - field: your_role
              type: string
              required: true
              maps_to: "your_role"
            - field: situation
              type: string
              required: true
              maps_to: "situation"
            - field: key_stakeholders
              type: string
              required: false
              maps_to: "key_stakeholders"
            - field: constraints
              type: string
              required: false
              maps_to: "constraints"
    as_sender:
      guarantees:
        - field: landscape
          type: string
          always_present: true
          description: "Political dynamic named in 2-3 sentences"
        - field: key_players
          type: array
          always_present: true
          description: "Max 3 stakeholders with interest, influence, and stance"
        - field: recommendations
          type: array
          always_present: true
          description: "Top 3 actions ranked by impact"
        - field: risk
          type: string
          always_present: true
          description: "One sentence on what to watch out for"
        - field: confidence
          type: string
          always_present: true
          description: "Confidence level: high, medium, or low"
      ready_condition: "landscape AND key_players AND recommendations AND risk AND confidence are all populated"

  human_in_the_loop_conditions:
    - Review recommended before high-stakes stakeholder conversations
    - Approval required before acting on influence strategies in formal settings
    - Flag outputs when stakeholder motivation confidence is low

  memory:
    conversation: "Track stakeholder names, roles, and relationships mentioned in the session"
    working:
      - Current situation context
      - Mapped dynamics
      - Recommended actions
    persistent:
      - None (each session starts fresh)
    shared:
      - Can receive organizational context from other agents in a pipeline
      - Political landscape context shared with superhero agent for obstacle framing
      - Stakeholder mapping shared with networking agent for strategic connections

  context:
    strategy: "Political navigation requires depth over breadth"
    token_budget: 10000
    reserve_for_references: 4000
    priority_order:
      - System prompt with navigation principles
      - Personality modifier (if selected)
      - Skill workflow
      - User situation and stakeholder information
      - Output constraints
      - Relevant reference files (if needed)
    include:
      - Stakeholder mapping frameworks
      - Political dynamics terminology
      - Career coaching frameworks (when coach skill selected)
    exclude:
      - Generic management theory
      - Legal or HR compliance content
      - Exhaustive organizational design material

  knowledge:
    references:
      - path: references/stakeholder-mapping-frameworks.md
        description: Influence/interest matrix, power mapping approaches
        load_when: Always
      - path: references/career-coaching-frameworks.md
        description: GROW model, strengths-based coaching approaches
        load_when: Career Coach skill selected
      - path: references/glossary-and-resources.md
        description: Political dynamics terminology and external resource links
        load_when: On demand

  assets:
    - name: stakeholder-map
      filename: "{situation}-stakeholder-map.md"
      description: Structured stakeholder map output
    - name: influence-strategy
      filename: "{situation}-influence-strategy.md"
      description: Sequenced action plan for stakeholder engagement
    - name: career-plan
      filename: "{role}-career-plan.md"
      description: Career development plan with political positioning

  quality:
    acceptance_criteria:
      - Political dynamic is named explicitly, not vaguely described
      - Stakeholder map distinguishes formal power from informal influence
      - Recommendations are sequenced and specific to the situation (not generic advice)
      - Risks are named with contingency guidance
      - Confidence level is stated and justified
      - No manipulation tactics or unethical suggestions
    ab_comparison_testing:
      approach: >
        Generate stakeholder analysis with and without the skill.
        Compare on:
      dimensions:
        - power_dynamic_accuracy
        - political_insight_depth
        - actionability_of_recommendations
        - risk_identification_quality
    obsolescence_detection:
      signals:
        - Users skip stakeholder mapping and navigate politics intuitively
        - LLM produces equivalent power-dynamic analysis unprompted
        - Organizational theory frameworks have been superseded
